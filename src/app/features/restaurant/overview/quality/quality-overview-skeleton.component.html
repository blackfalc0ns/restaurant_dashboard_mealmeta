<div class="mm-ql-skeleton__inner" aria-hidden="true">
  <div class="mm-ql-skeleton__header">
    <div>
      <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--short"></span>
      <span class="mm-ov-bone mm-ov-bone--title"></span>
      <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--mid"></span>
    </div>
  </div>

  <div class="mm-ql-skeleton__metrics">
    @for (_ of [1, 2, 3, 4]; track $index) {
      <div class="mm-ql-skeleton__metric">
        <span class="mm-ov-bone mm-ov-bone--avatar"></span>
        <div class="mm-ql-skeleton__metric-copy">
          <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--short"></span>
          <span class="mm-ov-bone mm-ov-bone--value"></span>
        </div>
      </div>
    }
  </div>

  <div class="mm-ql-skeleton__wide">
    <div class="mm-ql-skeleton__card">
      <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--mid"></span>
      <span class="mm-ov-bone mm-ov-bone--block" style="height: 11rem"></span>
    </div>
    <div class="mm-ql-skeleton__card">
      <span class="mm-ov-bone mm-ov-bone--value" style="width: 4rem; height: 3rem; margin: 0.5rem auto"></span>
      @for (_ of [1, 2, 3, 4]; track $index) {
        <span class="mm-ov-bone mm-ov-bone--line"></span>
      }
    </div>
  </div>

  <div class="mm-ql-skeleton__equal">
    @for (_ of [1, 2]; track $index) {
      <div class="mm-ql-skeleton__card">
        <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--mid"></span>
        @for (__ of [1, 2, 3, 4]; track $index) {
          <span class="mm-ov-bone mm-ov-bone--line"></span>
        }
      </div>
    }
  </div>
</div>
