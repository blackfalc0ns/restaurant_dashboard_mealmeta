<div class="mm-op-skeleton__inner" aria-hidden="true">
  <div class="mm-op-skeleton__header">
    <div>
      <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--short"></span>
      <span class="mm-ov-bone mm-ov-bone--title"></span>
      <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--mid"></span>
    </div>
    <span class="mm-ov-bone mm-ov-bone--btn"></span>
  </div>

  <div class="mm-op-skeleton__metrics">
    @for (_ of [1, 2, 3, 4]; track $index) {
      <div class="mm-op-skeleton__metric">
        <span class="mm-ov-bone mm-ov-bone--avatar"></span>
        <div class="mm-op-skeleton__metric-copy">
          <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--short"></span>
          <span class="mm-ov-bone mm-ov-bone--value"></span>
        </div>
      </div>
    }
  </div>

  <div class="mm-op-skeleton__layout">
    <div class="mm-op-skeleton__main">
      <div class="mm-op-skeleton__card">
        <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--mid"></span>
        <span class="mm-ov-bone mm-ov-bone--block" style="height: 10rem"></span>
      </div>
      <div class="mm-op-skeleton__card">
        <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--mid"></span>
        @for (_ of [1, 2, 3, 4, 5, 6]; track $index) {
          <span class="mm-ov-bone mm-ov-bone--line"></span>
        }
      </div>
    </div>
    <div class="mm-op-skeleton__rail">
      @for (_ of [1, 2, 3]; track $index) {
        <div class="mm-op-skeleton__card">
          <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--mid"></span>
          <span class="mm-ov-bone mm-ov-bone--line"></span>
          <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--short"></span>
        </div>
      }
    </div>
  </div>
</div>
