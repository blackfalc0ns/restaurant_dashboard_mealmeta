<div class="mm-fn-skeleton__inner" aria-hidden="true">
  <div class="mm-fn-skeleton__header">
    <div>
      <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--short"></span>
      <span class="mm-ov-bone mm-ov-bone--title"></span>
      <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--mid"></span>
    </div>
    <span class="mm-ov-bone mm-ov-bone--btn"></span>
  </div>

  <div class="mm-fn-skeleton__metrics">
    @for (_ of [1, 2, 3, 4]; track $index) {
      <div class="mm-fn-skeleton__metric">
        <span class="mm-ov-bone mm-ov-bone--avatar"></span>
        <div class="mm-fn-skeleton__metric-copy">
          <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--short"></span>
          <span class="mm-ov-bone mm-ov-bone--value"></span>
        </div>
      </div>
    }
  </div>

  <div class="mm-fn-skeleton__wide">
    <div class="mm-fn-skeleton__card">
      <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--mid"></span>
      <span class="mm-ov-bone mm-ov-bone--block" style="height: 12rem"></span>
    </div>
    <div class="mm-fn-skeleton__card">
      <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--mid"></span>
      @for (_ of [1, 2, 3, 4]; track $index) {
        <span class="mm-ov-bone mm-ov-bone--line"></span>
      }
    </div>
  </div>

  <div class="mm-fn-skeleton__equal">
    <div class="mm-fn-skeleton__card">
      <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--mid"></span>
      @for (_ of [1, 2, 3, 4, 5]; track $index) {
        <span class="mm-ov-bone mm-ov-bone--line"></span>
      }
    </div>
    <div class="mm-fn-skeleton__card">
      <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--mid"></span>
      <div class="mm-fn-skeleton__actions">
        @for (_ of [1, 2, 3, 4]; track $index) {
          <span class="mm-ov-bone mm-ov-bone--action"></span>
        }
      </div>
    </div>
  </div>
</div>
