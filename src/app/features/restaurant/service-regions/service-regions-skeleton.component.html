<div class="mm-sr-skeleton__inner" aria-hidden="true">
  <div class="mm-sr-skeleton__hero">
    <div class="mm-sr-skeleton__hero-main">
      <span class="mm-ov-bone mm-ov-bone--pill"></span>
      <span class="mm-ov-bone mm-ov-bone--title"></span>
      <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--mid"></span>
    </div>
    <div class="mm-sr-skeleton__metrics">
      <div class="mm-sr-skeleton__metric">
        <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--short"></span>
        <span class="mm-ov-bone mm-ov-bone--value"></span>
      </div>
      <div class="mm-sr-skeleton__metric">
        <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--short"></span>
        <span class="mm-ov-bone mm-ov-bone--value"></span>
      </div>
      <div class="mm-sr-skeleton__metric">
        <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--short"></span>
        <span class="mm-ov-bone mm-ov-bone--value"></span>
      </div>
    </div>
  </div>

  <div class="mm-sr-skeleton__board">
    <div class="mm-sr-skeleton__toolbar">
      <span class="mm-ov-bone mm-sr-skeleton__search"></span>
      <div class="mm-sr-skeleton__chips">
        <span class="mm-ov-bone mm-ov-bone--chip"></span>
        <span class="mm-ov-bone mm-ov-bone--chip"></span>
        <span class="mm-ov-bone mm-ov-bone--chip"></span>
      </div>
    </div>

    <div class="mm-sr-skeleton__list">
      @for (row of rows; track row) {
        <div class="mm-sr-skeleton__card">
          <div class="mm-sr-skeleton__card-main">
            <span class="mm-ov-bone mm-ov-bone--avatar"></span>
            <div class="mm-sr-skeleton__card-copy">
              <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--short"></span>
              <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--mid"></span>
            </div>
          </div>
          <div class="mm-sr-skeleton__card-meta">
            <span class="mm-ov-bone mm-ov-bone--chip"></span>
            <span class="mm-ov-bone mm-ov-bone--btn"></span>
          </div>
        </div>
      }
    </div>
  </div>
</div>
