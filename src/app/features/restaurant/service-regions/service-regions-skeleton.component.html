<div class="mm-ops-skeleton__inner" aria-hidden="true">
  <div class="mm-ops-skeleton__hero">
    <div class="mm-ops-skeleton__hero-main">
      <span class="mm-ops-bone mm-ops-bone--eyebrow"></span>
      <span class="mm-ops-bone mm-ops-bone--title"></span>
      <span class="mm-ops-bone mm-ops-bone--subtitle"></span>
    </div>
    <div class="mm-ops-skeleton__metrics">
      @for (_ of [1, 2, 3]; track $index) {
        <div class="mm-ops-skeleton__metric">
          <span class="mm-ops-bone mm-ops-bone--label"></span>
          <span class="mm-ops-bone mm-ops-bone--value"></span>
        </div>
      }
    </div>
  </div>

  <div class="mm-ops-skeleton__board">
    <div class="mm-ops-skeleton__toolbar">
      <span class="mm-ops-bone mm-ops-skeleton__search"></span>
      <div class="mm-ops-skeleton__chips">
        @for (_ of [1, 2, 3]; track $index) {
          <span class="mm-ops-bone mm-ops-bone--chip"></span>
        }
      </div>
    </div>

    <div class="mm-ops-skeleton__list">
      @for (_ of [1, 2, 3, 4, 5, 6]; track $index) {
        <div class="mm-ops-skeleton__card">
          <div class="mm-ops-skeleton__card-main">
            <span class="mm-ops-bone mm-ops-bone--avatar"></span>
            <div class="mm-ops-skeleton__card-copy">
              <span class="mm-ops-bone mm-ops-bone--name"></span>
              <span class="mm-ops-bone mm-ops-bone--meta"></span>
            </div>
          </div>
          <div class="mm-ops-skeleton__card-meta">
            <span class="mm-ops-bone mm-ops-bone--window"></span>
            <span class="mm-ops-bone mm-ops-bone--toggle"></span>
            <span class="mm-ops-bone mm-ops-bone--chevron"></span>
          </div>
        </div>
      }
    </div>
  </div>
</div>
