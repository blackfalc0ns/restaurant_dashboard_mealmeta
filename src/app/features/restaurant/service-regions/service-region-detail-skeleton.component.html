<div class="mm-ops-skeleton__inner" aria-hidden="true">
  <div class="mm-ops-skeleton__detail-hero">
    <div class="mm-ops-skeleton__detail-top">
      <div class="mm-ops-skeleton__detail-copy">
        <span class="mm-ops-bone mm-ops-bone--chip"></span>
        <span class="mm-ops-bone mm-ops-bone--title"></span>
        <span class="mm-ops-bone mm-ops-bone--subtitle"></span>
      </div>
      <div class="mm-ops-skeleton__detail-actions">
        <span class="mm-ops-bone mm-ops-bone--toggle"></span>
        <span class="mm-ops-bone mm-ops-bone--toggle"></span>
      </div>
    </div>
    <div class="mm-ops-skeleton__metrics mm-ops-skeleton__metrics--detail">
      @for (_ of [1, 2, 3, 4]; track $index) {
        <div class="mm-ops-skeleton__metric">
          <span class="mm-ops-bone mm-ops-bone--label"></span>
          <span class="mm-ops-bone mm-ops-bone--value"></span>
        </div>
      }
    </div>
  </div>

  <div class="mm-ops-skeleton__split">
    <div class="mm-ops-skeleton__board">
      <span class="mm-ops-bone mm-ops-bone--name"></span>
      @for (_ of [1, 2, 3, 4]; track $index) {
        <div class="mm-ops-skeleton__feed-row">
          <span class="mm-ops-bone mm-ops-bone--avatar"></span>
          <div class="mm-ops-skeleton__card-copy">
            <span class="mm-ops-bone mm-ops-bone--name"></span>
            <span class="mm-ops-bone mm-ops-bone--meta"></span>
          </div>
          <span class="mm-ops-bone mm-ops-bone--chip"></span>
        </div>
      }
    </div>
    <div class="mm-ops-skeleton__side">
      @for (_ of [1, 2]; track $index) {
        <div class="mm-ops-skeleton__board">
          <span class="mm-ops-bone mm-ops-bone--name"></span>
          <span class="mm-ops-bone mm-ops-bone--meta" style="margin-top: 0.75rem; width: 100%"></span>
          <span class="mm-ops-bone mm-ops-bone--block"></span>
        </div>
      }
    </div>
  </div>
</div>
