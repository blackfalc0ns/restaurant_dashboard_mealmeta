<div class="mm-mn-skeleton__inner" aria-hidden="true">
  <div class="mm-mn-skeleton__header">
    <div>
      <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--short"></span>
      <span class="mm-ov-bone mm-ov-bone--title"></span>
      <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--mid"></span>
    </div>
    <span class="mm-ov-bone mm-ov-bone--btn"></span>
  </div>

  <div class="mm-mn-skeleton__summary">
    @for (_ of [1, 2, 3, 4]; track $index) {
      <div class="mm-mn-skeleton__card mm-mn-skeleton__card--summary">
        <span class="mm-ov-bone mm-ov-bone--avatar"></span>
        <div>
          <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--short"></span>
          <span class="mm-ov-bone mm-ov-bone--value"></span>
        </div>
      </div>
    }
  </div>

  <div class="mm-mn-skeleton__card">
    <div class="mm-mn-skeleton__toolbar">
      <span class="mm-ov-bone mm-ov-bone--line" style="flex: 1"></span>
      <span class="mm-ov-bone mm-ov-bone--btn"></span>
      <span class="mm-ov-bone mm-ov-bone--btn"></span>
    </div>
  </div>

  <div class="mm-mn-skeleton__tabs">
    @for (_ of [1, 2, 3, 4]; track $index) {
      <span class="mm-ov-bone mm-ov-bone--chip"></span>
    }
  </div>

  <div class="mm-mn-skeleton__grid">
    @for (_ of [1, 2, 3, 4, 5, 6, 7, 8]; track $index) {
      <div class="mm-mn-skeleton__meal">
        <span
          class="mm-ov-bone mm-ov-bone--avatar"
          style="width: 3.5rem; height: 3.5rem; border-radius: 0.75rem"
        ></span>
        <div style="display: flex; flex-direction: column; gap: 0.35rem; min-width: 0">
          <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--short"></span>
          <span class="mm-ov-bone mm-ov-bone--line"></span>
        </div>
        <span class="mm-ov-bone mm-ov-bone--chip"></span>
        <span class="mm-ov-bone mm-ov-bone--btn"></span>
      </div>
    }
  </div>
</div>
