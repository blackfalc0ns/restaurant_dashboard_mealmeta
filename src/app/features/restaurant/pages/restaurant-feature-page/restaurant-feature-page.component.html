<section class="w-full px-3 py-3 sm:px-4 sm:py-5" [attr.dir]="locale.isRtl() ? 'rtl' : 'ltr'">
  <header class="border-b border-slate-200 pb-6">
    <div class="mb-3 flex flex-wrap items-center gap-2">
      <span class="inline-flex items-center gap-2 text-xs font-bold text-emerald-700">
        <span class="size-2 rounded-full bg-amber-400" aria-hidden="true"></span>
        {{ statusLabel() }}
      </span>
    </div>
    <h1 class="m-0 text-2xl font-extrabold text-slate-950 sm:text-3xl">{{ title() }}</h1>
    <p class="mt-3 max-w-3xl text-sm font-medium leading-7 text-slate-600 sm:text-base">
      {{ description() }}
    </p>
  </header>

  <div class="py-6">
    <p class="mb-3 text-xs font-bold text-slate-500">{{ blueprintLabel() }}</p>
    <div class="flex flex-wrap gap-2">
      @for (feature of features; track feature) {
        <span class="rounded-md border border-emerald-200 bg-emerald-50 px-2.5 py-1 text-xs font-bold text-emerald-800">
          {{ feature }}
        </span>
      }
    </div>
  </div>
</section>
