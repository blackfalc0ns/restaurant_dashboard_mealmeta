<div class="mm-lb-skeleton__inner" aria-hidden="true">
  <div class="mm-lb-skeleton__header">
    <div>
      <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--short"></span>
      <span class="mm-ov-bone mm-ov-bone--title"></span>
      <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--mid"></span>
    </div>
    <span class="mm-ov-bone mm-ov-bone--btn"></span>
  </div>

  <div class="mm-lb-skeleton__summary">
    @for (_ of [1, 2, 3, 4]; track $index) {
      <div class="mm-lb-skeleton__card mm-lb-skeleton__card--summary">
        <span class="mm-ov-bone mm-ov-bone--avatar"></span>
        <div>
          <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--short"></span>
          <span class="mm-ov-bone mm-ov-bone--value"></span>
        </div>
      </div>
    }
  </div>

  <div class="mm-lb-skeleton__card">
    <div class="mm-lb-skeleton__toolbar">
      <span class="mm-ov-bone mm-ov-bone--line" style="flex: 1"></span>
      <span class="mm-ov-bone mm-ov-bone--btn"></span>
    </div>
  </div>

  <div class="mm-lb-skeleton__tabs">
    @for (_ of [1, 2, 3, 4]; track $index) {
      <span class="mm-ov-bone mm-ov-bone--chip"></span>
    }
  </div>

  <div class="mm-lb-skeleton__card">
    @for (_ of [1, 2, 3, 4, 5]; track $index) {
      <div class="mm-lb-skeleton__row">
        <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--short"></span>
        <span class="mm-ov-bone mm-ov-bone--line"></span>
        <span class="mm-ov-bone mm-ov-bone--chip"></span>
        <span class="mm-ov-bone mm-ov-bone--btn"></span>
      </div>
    }
  </div>
</div>
