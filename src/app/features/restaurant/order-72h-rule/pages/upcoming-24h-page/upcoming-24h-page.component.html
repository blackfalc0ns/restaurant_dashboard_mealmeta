<section dir="rtl" class="mm-page">
  <header class="mm-page__header">
    <h1>توصيل خلال 24 ساعة</h1>
    <p>قائمة −24h — تحضير نهائي، فواتير، باركود، ملصقات (F12)</p>
  </header>

  <mm-page-state
    [viewState]="facade.state.page.viewState"
    emptyMessage="لا توجد طلبات للتحضير خلال 24h"
    (retry)="onRetry()"
  />

  @if (facade.state.page.viewState === 'success') {
    <mm-preparation-order-list
      [upcomingRows]="facade.state.upcoming24hRows"
      mode="upcoming-24h"
    />
  }
</section>
