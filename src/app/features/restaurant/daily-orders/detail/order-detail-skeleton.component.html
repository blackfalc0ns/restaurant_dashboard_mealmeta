<div class="mm-od-skeleton__inner" aria-hidden="true">
  <span class="mm-ov-bone mm-ov-bone--chip"></span>

  <div class="mm-od-skeleton__card">
    <div class="mm-od-skeleton__header">
      <div>
        <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--short"></span>
        <span class="mm-ov-bone mm-ov-bone--title"></span>
        <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--mid"></span>
      </div>
      <span class="mm-ov-bone mm-ov-bone--btn"></span>
    </div>
  </div>

  <div class="mm-od-skeleton__card">
    <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--mid"></span>
    <div class="mm-od-skeleton__facts mt-3">
      @for (_ of [1, 2, 3, 4]; track $index) {
        <span class="mm-ov-bone mm-ov-bone--block" style="height: 3.5rem"></span>
      }
    </div>
  </div>

  <div class="mm-od-skeleton__layout">
    <div class="mm-od-skeleton__main">
      <div class="mm-od-skeleton__card">
        <div class="grid gap-3 md:grid-cols-2">
          @for (_ of [1, 2, 3, 4]; track $index) {
            <span class="mm-ov-bone mm-ov-bone--block" style="height: 12rem"></span>
          }
        </div>
      </div>
    </div>
    <div class="mm-od-skeleton__rail">
      @for (_ of [1, 2, 3]; track $index) {
        <div class="mm-od-skeleton__card">
          <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--mid"></span>
          <span class="mm-ov-bone mm-ov-bone--line"></span>
          <span class="mm-ov-bone mm-ov-bone--line mm-ov-bone--short"></span>
        </div>
      }
    </div>
  </div>
</div>
