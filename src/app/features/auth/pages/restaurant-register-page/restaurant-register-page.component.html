<mm-restaurant-auth-form-card [title]="copy().formTitle" [subtitle]="copy().formSubtitle">
  <div class="flex flex-col gap-5">
    <p class="m-0 rounded-xl border border-mm-field-border bg-mm-field px-4 py-3 text-sm leading-relaxed text-stone-600">
      {{ copy().comingSoon }}
    </p>

    <p class="m-0 text-center text-xs text-mm-ink-muted sm:text-sm">
      <a class="mm-restaurant-auth__link font-semibold" routerLink="/restaurant/login">
        {{ copy().backToLogin }}
      </a>
    </p>
  </div>
</mm-restaurant-auth-form-card>
