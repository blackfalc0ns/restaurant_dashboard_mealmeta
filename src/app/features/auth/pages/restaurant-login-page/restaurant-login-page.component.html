<mm-restaurant-auth-form-card [title]="copy().formTitle" [subtitle]="copy().formSubtitle">
  <form class="flex flex-col gap-5" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    @if (auth.errorMessage(); as err) {
      <div
        class="flex items-start gap-2 rounded-xl border border-red-200/80 bg-red-50/90 px-3 py-2.5 text-sm font-medium text-red-700 sm:px-4 sm:py-3"
        role="alert"
      >
        <svg class="mt-0.5 size-4 shrink-0" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5" />
          <path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
        <span>{{ err }}</span>
      </div>
    }

    <div class="flex flex-col gap-1.5">
      <label class="text-xs font-semibold text-stone-600 sm:text-sm" for="identifier">
        {{ copy().identifierLabel }}
      </label>
      <div class="group relative">
        <span
          class="pointer-events-none absolute inset-y-0 start-0 z-10 flex w-12 items-center justify-center"
          aria-hidden="true"
        >
          <span class="mm-restaurant-auth__field-icon">
            <svg class="size-[1.05rem]" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5" />
              <path
                d="M5 20c0-3.3 3.1-6 7-6s7 2.7 7 6"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              />
            </svg>
          </span>
        </span>
        <input
          id="identifier"
          z-input
          zSize="lg"
          type="text"
          class="mm-auth-field mm-restaurant-auth__input h-12 w-full rounded-xl ps-[3.25rem] pe-4 text-start text-base"
          formControlName="identifier"
          [placeholder]="copy().identifierPlaceholder"
          autocomplete="username"
        />
      </div>
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-xs font-semibold text-stone-600 sm:text-sm" for="password">
        {{ copy().passwordLabel }}
      </label>
      <div class="group relative">
        <span
          class="pointer-events-none absolute inset-y-0 start-0 z-10 flex w-12 items-center justify-center"
          aria-hidden="true"
        >
          <span class="mm-restaurant-auth__field-icon">
            <svg class="size-[1.05rem]" viewBox="0 0 24 24" fill="none">
              <rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5" />
              <path
                d="M8 11V8a4 4 0 1 1 8 0v3"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              />
            </svg>
          </span>
        </span>
        <button
          type="button"
          class="mm-restaurant-auth__pw-toggle absolute inset-y-0 end-0 z-10 flex w-12 items-center justify-center"
          (click)="togglePassword()"
          [attr.aria-label]="showPassword() ? copy().hidePassword : copy().showPassword"
        >
          @if (showPassword()) {
            <svg class="size-[1.05rem]" viewBox="0 0 24 24" fill="none">
              <path
                d="M3 3l18 18M10.6 10.6A4 4 0 0 0 12 16a4 4 0 0 0 3.4-1.9M6.7 6.7C4.6 8.1 3 10 2 12c2 4 6 7 10 7 1.5 0 2.9-.3 4.2-.9M9.9 5.1A10.8 10.8 0 0 1 12 5c4 0 8 3 10 7a11.6 11.6 0 0 1-2.1 3.1"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              />
            </svg>
          } @else {
            <svg class="size-[1.05rem]" viewBox="0 0 24 24" fill="none">
              <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12Z" stroke="currentColor" stroke-width="1.5" />
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5" />
            </svg>
          }
        </button>
        <input
          id="password"
          z-input
          zSize="lg"
          class="mm-auth-field mm-restaurant-auth__input h-12 w-full rounded-xl ps-[3.25rem] pe-12 text-start text-base"
          [type]="showPassword() ? 'text' : 'password'"
          formControlName="password"
          [placeholder]="copy().passwordPlaceholder"
          autocomplete="current-password"
        />
      </div>
      <a
        class="mm-restaurant-auth__link self-start text-xs font-semibold sm:text-sm"
        routerLink="/restaurant/forgot-password"
      >
        {{ copy().forgotPassword }}
      </a>
    </div>

    <z-checkbox formControlName="rememberSession" class="mm-restaurant-auth__checkbox text-xs text-mm-ink-muted sm:text-sm">
      {{ copy().rememberSession }}
    </z-checkbox>

    <button
      type="submit"
      class="mm-restaurant-auth__submit"
      [disabled]="isSubmitting()"
      [attr.aria-busy]="isSubmitting()"
    >
      @if (isSubmitting()) {
        <span class="mm-restaurant-auth__spinner" aria-hidden="true"></span>
        <span>{{ copy().submitting }}</span>
      } @else {
        <span>{{ copy().submit }}</span>
        <svg class="size-4 shrink-0 rtl:rotate-180" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path
            d="M5 12h14M13 6l6 6-6 6"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      }
    </button>

    <p class="m-0 text-center text-xs text-mm-ink-muted sm:text-sm">
      <a class="mm-restaurant-auth__link font-semibold" routerLink="/restaurant/onboarding">
        {{ copy().createAccount }}
      </a>
    </p>
  </form>
</mm-restaurant-auth-form-card>
