<mm-restaurant-auth-form-card [title]="copy().formTitle" [subtitle]="copy().formSubtitle">
  <form class="flex flex-col gap-5" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <p class="m-0 text-center text-sm font-semibold text-mm-emerald" dir="ltr">
      {{ maskedEmail() }}
    </p>

    @if (recovery.errorMessage(); as err) {
      <div
        class="flex items-start gap-2 rounded-xl border border-red-200/80 bg-red-50/90 px-3 py-2.5 text-sm font-medium text-red-700 sm:px-4 sm:py-3"
        role="alert"
      >
        <svg class="mt-0.5 size-4 shrink-0" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5" />
          <path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
        <span>{{ err }}</span>
      </div>
    }

    <div class="flex flex-col gap-2">
      <label class="text-center text-xs font-semibold text-stone-600 sm:text-sm">
        {{ copy().codeLabel }}
      </label>
      <mm-otp-input formControlName="code" [ariaLabel]="copy().codeLabel" />
    </div>

    <button
      type="submit"
      class="mm-restaurant-auth__submit"
      [disabled]="recovery.isSubmitting()"
      [attr.aria-busy]="recovery.isSubmitting()"
    >
      @if (recovery.isSubmitting()) {
        <span class="mm-restaurant-auth__spinner" aria-hidden="true"></span>
        <span>{{ copy().verifying }}</span>
      } @else {
        <span>{{ copy().verify }}</span>
        <svg class="size-4 shrink-0 rtl:rotate-180" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path
            d="M5 12h14M13 6l6 6-6 6"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      }
    </button>

    <div class="text-center text-xs text-mm-ink-muted sm:text-sm">
      @if (recovery.resendCooldown() > 0) {
        <span>
          {{ copy().resendIn }}
          <span class="font-bold text-mm-emerald" dir="ltr">{{ recovery.resendCooldown() }}s</span>
        </span>
      } @else {
        <button
          type="button"
          class="mm-restaurant-auth__link cursor-pointer border-0 bg-transparent p-0 text-xs font-semibold sm:text-sm"
          (click)="resend()"
        >
          {{ copy().resend }}
        </button>
      }
    </div>

    <p class="m-0 text-center text-xs text-mm-ink-muted sm:text-sm">
      <a class="mm-restaurant-auth__link font-semibold" routerLink="/restaurant/forgot-password">
        {{ copy().backToForgotPassword }}
      </a>
    </p>
  </form>
</mm-restaurant-auth-form-card>
