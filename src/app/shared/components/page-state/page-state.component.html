@switch (viewState) {
  @case ('loading') {
    <p class="mm-page-state" aria-live="polite">جاري التحميل...</p>
  }
  @case ('empty') {
    <p class="mm-page-state">{{ emptyMessage }}</p>
  }
  @case ('error') {
    <div class="mm-page-state mm-page-state--error">
      <p>{{ errorMessage }}</p>
      <button type="button" (click)="retry.emit()">إعادة المحاولة</button>
    </div>
  }
}
